name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'app/chat/frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/chat/frontend/package-lock.json
      - run: npm ci
        working-directory: app/chat/frontend
      - run: npm run build
        working-directory: app/chat/frontend
        env:
          VITE_BASE: /
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/chat/frontend/dist
      - uses: actions/deploy-pages@v4
