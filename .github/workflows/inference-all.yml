name: Inference (all models)
run-name: "all models"
'on':
  workflow_dispatch: {}
permissions:
  actions: write
  contents: read
  packages: read
jobs:
  detect:
    runs-on: ubuntu-24.04-arm
    outputs:
      models: ${{ steps.set-matrix.outputs.models }}
    steps:
      - uses: actions/checkout@v4
      - name: Build model matrix
        id: set-matrix
        run: |
          MATRIX=$(python3 config/models.py --inference-names)
          echo "models=$MATRIX" >> $GITHUB_OUTPUT
          echo "Running models: $MATRIX"

  run:
    needs: detect
    name: "${{ matrix.model }}"
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJson(needs.detect.outputs.models) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/inference
        with:
          model_name: ${{ matrix.model }}
          workflow_file: inference.yml
          duration_hours: '5'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          hf_token: ${{ secrets.HF_TOKEN }}
          tunnel_write_key: ${{ secrets.TUNNEL_WRITE_KEY }}
