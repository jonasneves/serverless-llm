name: Build

run-name: "Build Images • ${{ github.event_name == 'push' && 'Push' || inputs.models || 'all' }}"

on:
  push:
    branches:
      - main
    paths:
      - 'app/shared/**'
      - 'app/*/Dockerfile'
      - 'app/*/requirements.txt'
      - 'app/*/inference_server.py'
      - 'config/**'
      - '.github/workflows/build-push-images.yml'
  workflow_dispatch:
    inputs:
      models:
        description: 'Models to build (comma-separated, or "all")'
        required: false
        default: 'all'
        type: string
      no_cache:
        description: 'Build without cache (forces fresh build)'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/lm-arena

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    runs-on: ubuntu-24.04-arm
    outputs:
      models: ${{ steps.set-matrix.outputs.models }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed models
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODELS="${{ inputs.models }}"
          else
            CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
            echo "Changed files:"
            echo "$CHANGED_FILES"

            # Extract changed model directories (includes -inference)
            CHANGED_MODELS=$(echo "$CHANGED_FILES" | grep -E '^app/.+-inference/' | cut -d'/' -f2 | sort -u | tr '\n' ',' | sed 's/,$//')

            # If shared/ or config/ changed, rebuild all; otherwise build only changed models
            if echo "$CHANGED_FILES" | grep -qE '^(app/shared/|config/)'; then
              MODELS="all"
            elif [ -n "$CHANGED_MODELS" ]; then
              MODELS="$CHANGED_MODELS"
            else
              MODELS=""
            fi
          fi

          echo "models=$MODELS" >> $GITHUB_OUTPUT

      - name: Set build matrix
        id: set-matrix
        run: |
          MODELS="${{ steps.detect.outputs.models }}"

          if [ "$MODELS" = "all" ]; then
            # Get inference directories from Python config (single source of truth)
            INFERENCE_MODELS=$(python3 config/models.py --inference-dirs)
            MATRIX=$(echo "$INFERENCE_MODELS" | jq -c '.')
          elif [ -z "$MODELS" ]; then
            # No relevant changes detected; skip all builds
            MATRIX="[]"
          else
            # Build only specified models (use -c for compact output)
            MATRIX=$(echo "$MODELS" | jq -cR 'split(",") | map(select(length > 0))')
          fi

          echo "models=$MATRIX" >> $GITHUB_OUTPUT
          echo "Building models: $MATRIX"

  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.models != '[]'
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        model: ${{ fromJson(needs.detect-changes.outputs.models) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.model }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Compute build config
        id: config
        run: |
          # Pinned llama.cpp release: update when new architecture support is needed
          LLAMA_COMMIT="b8261"
          MODEL="${{ matrix.model }}"
          # Derive short model name from inference_dir (e.g. "lfm2-inference" -> "lfm2")
          MODEL_NAME=$(echo "$MODEL" | sed 's/-inference$//')
          CONFIG=$(python3 config/models.py "$MODEL_NAME" 2>/dev/null || echo '{}')
          DOCKERFILE_TYPE=$(echo "$CONFIG" | jq -r '.dockerfile // "inference"')

          if [ "$DOCKERFILE_TYPE" = "llama-server" ]; then
            DOCKERFILE="./app/shared/Dockerfile.llama-server"
            CONTEXT="."
            # Only LLAMA_COMMIT is a build arg; MODEL_NAME is set at runtime
            echo "build_args=LLAMA_COMMIT=$LLAMA_COMMIT" >> $GITHUB_OUTPUT
          else
            DOCKERFILE="./app/shared/Dockerfile.inference"
            CONTEXT="."
            # Dockerfile.inference uses MODEL_NAME at runtime (env var), not a build arg
            echo "build_args=" >> $GITHUB_OUTPUT
          fi

          if [ -f "$DOCKERFILE" ]; then
            HASH=$(sha256sum "$DOCKERFILE" | cut -c1-8)
          else
            HASH="missing"
          fi

          echo "dockerfile=$DOCKERFILE" >> $GITHUB_OUTPUT
          echo "context=$CONTEXT" >> $GITHUB_OUTPUT
          echo "scope=$MODEL-$HASH" >> $GITHUB_OUTPUT
          echo "Using Dockerfile: $DOCKERFILE (scope: $MODEL-$HASH)"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.config.outputs.context }}
          file: ${{ steps.config.outputs.dockerfile }}
          build-args: ${{ steps.config.outputs.build_args }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: ${{ github.event.inputs.no_cache == 'true' }}
          # Cache scope includes Dockerfile hash - auto-invalidates when Dockerfile changes
          # Skip cache if no_cache is enabled
          cache-from: ${{ github.event.inputs.no_cache != 'true' && format('type=gha,scope={0}', steps.config.outputs.scope) || '' }}
          cache-to: ${{ github.event.inputs.no_cache != 'true' && format('type=gha,mode=max,scope={0}', steps.config.outputs.scope) || '' }}

      - name: Image summary
        run: |
          echo "### Built and pushed: ${{ matrix.model }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
